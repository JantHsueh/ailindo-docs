# docs.ailindo.com —— 文档站（Next.js / fumadocs）反向代理。
#
# Next.js standalone 只起 HTTP:3000（app 容器），这里做 TLS 终结 + 反向代理。
# TLS 参数内联（TLSv1.2/1.3 + ECDHE），不依赖外部下载的 options-ssl-nginx.conf / dhparam。

server {
    listen 80;
    server_name docs.ailindo.com;

    # Let's Encrypt HTTP-01 校验（certbot --webroot 写到这里，优先于下面的 301）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    # listen ... http2 是从 nginx 1.9.5 起所有版本都支持的兼容写法（新版会有 deprecation 提示但仍工作）。
    # 不用 `http2 on;` 单独指令，那是 1.25.1+ 才有，旧 stable 镜像会报 unknown directive。
    listen 443 ssl http2;
    server_name docs.ailindo.com;

    ssl_certificate     /etc/letsencrypt/live/docs.ailindo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/docs.ailindo.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # 文档反馈 POST 等请求体上限
    client_max_body_size 10m;

    # 补文本压缩（Next 已对 /_next/static 设长缓存，无需 nginx 再缓存）
    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    # Docker 内建 DNS + 变量做懒解析：app 未就绪（如证书引导阶段）时 nginx 仍能启动，
    # 到请求时才解析 upstream，避免 "host not found in upstream 'app'" 导致 nginx 起不来。
    resolver 127.0.0.11 valid=30s ipv6=off;

    location / {
        set $upstream http://app:3000;
        proxy_pass $upstream;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # AI 搜索是流式响应：拉长读超时、关闭缓冲，保证边生成边下发
        proxy_read_timeout 300s;
        proxy_buffering off;
    }
}
